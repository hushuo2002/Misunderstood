<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星际误解局</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cyan: #00f5ff;
    --cyan-dim: #00c8d4;
    --cyan-glow: rgba(0, 245, 255, 0.15);
    --magenta: #ff0090;
    --bg-deep: #020408;
    --bg-panel: #060d14;
    --grid-color: rgba(0, 245, 255, 0.04);
    --border-dim: rgba(0, 245, 255, 0.18);
    --text-primary: #e8f4f8;
    --text-muted: rgba(232, 244, 248, 0.45);
  }

  html, body {
    min-height: 100%;
    background:
      radial-gradient(circle at 20% 10%, rgba(0,245,255,0.16), transparent 30%),
      radial-gradient(circle at 80% 20%, rgba(255,0,144,0.12), transparent 28%),
      var(--bg-deep);
    background-image:
      linear-gradient(rgba(2, 4, 8, 0.54), rgba(2, 4, 8, 0.54)),
      url('./assets/bg.png');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: var(--text-primary);
    font-family: 'Rajdhani', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid-color) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
    background-size: 48px 48px;
    backdrop-filter: blur(3px);
    background-color: rgba(2, 4, 8, 0.58);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 0;
  }

  .page-wrapper {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 60px;
  }

  .site-header {
    width: 100%;
    max-width: 900px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border-dim);
    margin-bottom: 48px;
  }

  .brand {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }
  .brand-logo {
    height: 150px;
    width: auto;
    display: block;
    object-fit: contain;
    filter: drop-shadow(0 0 12px rgba(0, 245, 255, 0.28));
  }

  .logo-mark {
    position: relative;
    width: 40px;
    height: 40px;
    border: 1.5px solid var(--cyan);
    border-radius: 50%;
    box-shadow: 0 0 22px rgba(0, 245, 255, 0.22), inset 0 0 18px rgba(0, 245, 255, 0.08);
    flex: 0 0 auto;
  }

  .logo-mark::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(0, 245, 255, 0.7);
    border-radius: 50%;
    transform: rotate(-18deg) scaleX(1.35);
  }

  .logo-mark::after {
    content: '';
    position: absolute;
    width: 7px;
    height: 7px;
    right: 6px;
    top: 8px;
    border-radius: 50%;
    background: var(--magenta);
    box-shadow: 0 0 14px rgba(255, 0, 144, 0.85);
  }

  .logo {
    font-family: 'Orbitron', 'Rajdhani', sans-serif;
    font-size: clamp(15px, 3vw, 21px);
    font-weight: 900;
    letter-spacing: 0.18em;
    color: var(--cyan);
    text-transform: uppercase;
    text-shadow: 0 0 18px rgba(0,245,255,0.28);
  }

  .logo span { color: var(--text-primary); font-weight: 700; }

  .header-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--cyan);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .hero-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(28px, 7vw, 68px);
    font-weight: 900;
    line-height: 1;
    letter-spacing: 0.05em;
    text-align: center;
    text-transform: uppercase;
    margin-bottom: 12px;
    color: var(--text-primary);
    animation: fadeDown 0.8s ease both;
  }

  .hero-title .accent { color: var(--cyan); }

  .hero-sub {
    font-size: clamp(12px, 2.5vw, 15px);
    letter-spacing: 0.35em;
    color: var(--text-muted);
    text-align: center;
    text-transform: uppercase;
    margin-bottom: 52px;
    animation: fadeDown 0.8s 0.1s ease both;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .video-panel {
    width: 100%;
    max-width: 880px;
    animation: fadeUp 0.9s 0.2s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .panel-label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--cyan);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .panel-label::before {
    content: '';
    display: inline-block;
    width: 20px; height: 1px;
    background: var(--cyan);
  }

  .video-frame {
    position: relative;
    background: var(--bg-panel);
    border: 1px solid var(--border-dim);
    padding: 3px;
    box-shadow: 0 0 42px rgba(0, 245, 255, 0.06);
  }

  .video-frame::before,
  .video-frame::after,
  .video-frame .corner-br,
  .video-frame .corner-bl {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    border-color: var(--cyan);
    border-style: solid;
  }

  .video-frame::before  { top: -1px; left: -1px;  border-width: 2px 0 0 2px; }
  .video-frame::after   { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
  .video-frame .corner-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
  .video-frame .corner-bl { bottom: -1px; left: -1px;  border-width: 0 0 2px 2px; }

  .video-container {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    overflow: hidden;
  }

  .bilibili-player {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
    background: #000;
  }

  .stats-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-top: 1px solid var(--border-dim);
    background: rgba(0,245,255,0.02);
  }

  .stat-item {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-item span { color: var(--cyan); font-size: 13px; font-weight: 600; }

  .cta-wrap {
    margin-top: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    animation: fadeUp 0.9s 0.4s ease both;
  }

  .cta-label {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .cta-button {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 18px 52px;
    background: transparent;
    border: 1.5px solid var(--cyan);
    color: var(--cyan);
    font-family: 'Orbitron', monospace;
    font-size: clamp(13px, 3vw, 17px);
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    overflow: hidden;
    transition: color 0.3s;
  }

  .cta-button::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--cyan);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.35s cubic-bezier(.77,0,.18,1);
  }

  .cta-button:hover::before { transform: scaleX(1); }
  .cta-button:hover { color: var(--bg-deep); }

  .cta-button .btn-text,
  .cta-button .btn-arrow { position: relative; z-index: 1; }

  .btn-arrow { font-size: 20px; transition: transform 0.25s; }
  .cta-button:hover .btn-arrow { transform: translateX(5px); }

  .cta-button .b-tl, .cta-button .b-tr, .cta-button .b-bl, .cta-button .b-br {
    position: absolute;
    width: 10px; height: 10px;
    border-color: var(--cyan);
    border-style: solid;
    transition: border-color 0.3s;
    z-index: 2;
  }

  .cta-button:hover .b-tl,
  .cta-button:hover .b-tr,
  .cta-button:hover .b-bl,
  .cta-button:hover .b-br { border-color: var(--bg-deep); }

  .b-tl { top: -4px; left: -4px;  border-width: 2px 0 0 2px; }
  .b-tr { top: -4px; right: -4px; border-width: 2px 2px 0 0; }
  .b-bl { bottom: -4px; left: -4px;  border-width: 0 0 2px 2px; }
  .b-br { bottom: -4px; right: -4px; border-width: 0 2px 2px 0; }

  .footer {
    margin-top: 72px;
    width: 100%;
    max-width: 880px;
    border-top: 1px solid var(--border-dim);
    padding-top: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: rgba(232,244,248,0.2);
    text-transform: uppercase;
  }

  @media (max-width: 600px) {
    .site-header { margin-bottom: 32px; }
    .brand { gap: 8px; }
    .logo-mark { width: 34px; height: 34px; }
    .hero-title { margin-bottom: 10px; }
    .hero-sub { margin-bottom: 36px; }
    .stats-bar { flex-wrap: wrap; gap: 10px; }
    .footer { flex-direction: column; gap: 8px; text-align: center; }
  }
</style>
</head>
<body>

<div class="page-wrapper">

  <header class="site-header">
    <a class="brand" href="#" aria-label="星际误解局首页">
      <img class="brand-logo" src="./assets/logo.png" alt="星际误解局">
    </a>
    <div class="header-status">
      <div class="status-dot"></div>
      LIVE&nbsp;&nbsp;SYS.ONLINE
    </div>
  </header>

  <h1 class="hero-title"><span class="accent">星际</span>误解局</h1>
  <p class="hero-sub">地球人 · 月球人 · 文化冲击实录</p>

  <div class="video-panel">
    <div class="panel-label">PREVIEW / 影像档案</div>

    <div class="video-frame">
      <div class="corner-br"></div>
      <div class="corner-bl"></div>

      <div class="video-container">
        <!-- 将下面 src 中的 BV你的号码 替换成你上传到 B 站后得到的 BV 号，例如 BV1xxxxxxxxx。 -->
        <iframe
          class="bilibili-player"
          src="https://player.bilibili.com/player.html?bvid=BV15oG763ERY&page=1&high_quality=1&autoplay=0"
          title="星际误解局 Bilibili 视频播放器"
          scrolling="no"
          frameborder="0"
          allow="autoplay; fullscreen; picture-in-picture"
          allowfullscreen="true">
        </iframe>
      </div>

      <div class="stats-bar">
        <div class="stat-item">视频源 <span>BILIBILI</span></div>
        <div class="stat-item">播放方式 <span>内嵌</span></div>
        <div class="stat-item">状态 <span>ONLINE</span></div>
      </div>
    </div>
  </div>

  <div class="cta-wrap">
    <div class="cta-label">准备进入档案了吗？</div>
    <a class="cta-button" href="https://routhleck.com/moon-hackthon/">
      <div class="b-tl"></div><div class="b-tr"></div>
      <div class="b-bl"></div><div class="b-br"></div>
      <span class="btn-text">进入星际误解局</span>
      <span class="btn-arrow">▶</span>
    </a>
  </div>

  <footer class="footer">
    <span>© 2026 星际误解局</span>
    <span>CULTURE LOG · INTERSTELLAR</span>
  </footer>

</div>

<script>
  function readQueryParam(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
  }

  const bgFromQuery = readQueryParam('bg');

  if (bgFromQuery) {
    document.body.style.backgroundImage = `linear-gradient(rgba(2, 4, 8, 0.54), rgba(2, 4, 8, 0.54)), url('${bgFromQuery}')`;
  }
</script>
</body>
</html>
