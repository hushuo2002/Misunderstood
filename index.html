<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星际误解局</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cyan: #00f5ff;
    --cyan-dim: #00c8d4;
    --cyan-glow: rgba(0, 245, 255, 0.15);
    --magenta: #ff0090;
    --bg-deep: #020408;
    --bg-panel: #060d14;
    --grid-color: rgba(0, 245, 255, 0.04);
    --border-dim: rgba(0, 245, 255, 0.18);
    --text-primary: #e8f4f8;
    --text-muted: rgba(232, 244, 248, 0.45);
  }

  html, body {
    min-height: 100%;
    background:
      radial-gradient(circle at 20% 10%, rgba(0,245,255,0.16), transparent 30%),
      radial-gradient(circle at 80% 20%, rgba(255,0,144,0.12), transparent 28%),
      var(--bg-deep);
    background-image:
      linear-gradient(rgba(2, 4, 8, 0.54), rgba(2, 4, 8, 0.54)),
      url('./assets/bg.png');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: var(--text-primary);
    font-family: 'Rajdhani', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid-color) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
    background-size: 48px 48px;
    backdrop-filter: blur(3px);
    background-color: rgba(2, 4, 8, 0.58);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 0;
  }

  .page-wrapper {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 60px;
  }

  .site-header {
    width: 100%;
    max-width: 900px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border-dim);
    margin-bottom: 48px;
  }

  .brand {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }

  .logo-mark {
    position: relative;
    width: 40px;
    height: 40px;
    border: 1.5px solid var(--cyan);
    border-radius: 50%;
    box-shadow: 0 0 22px rgba(0, 245, 255, 0.22), inset 0 0 18px rgba(0, 245, 255, 0.08);
    flex: 0 0 auto;
  }

  .logo-mark::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(0, 245, 255, 0.7);
    border-radius: 50%;
    transform: rotate(-18deg) scaleX(1.35);
  }

  .logo-mark::after {
    content: '';
    position: absolute;
    width: 7px;
    height: 7px;
    right: 6px;
    top: 8px;
    border-radius: 50%;
    background: var(--magenta);
    box-shadow: 0 0 14px rgba(255, 0, 144, 0.85);
  }

  .logo {
    font-family: 'Orbitron', 'Rajdhani', sans-serif;
    font-size: clamp(15px, 3vw, 21px);
    font-weight: 900;
    letter-spacing: 0.18em;
    color: var(--cyan);
    text-transform: uppercase;
    text-shadow: 0 0 18px rgba(0,245,255,0.28);
  }

  .logo span { color: var(--text-primary); font-weight: 700; }

  .header-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--cyan);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .hero-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(28px, 7vw, 68px);
    font-weight: 900;
    line-height: 1;
    letter-spacing: 0.05em;
    text-align: center;
    text-transform: uppercase;
    margin-bottom: 12px;
    color: var(--text-primary);
    animation: fadeDown 0.8s ease both;
  }

  .hero-title .accent { color: var(--cyan); }

  .hero-sub {
    font-size: clamp(12px, 2.5vw, 15px);
    letter-spacing: 0.35em;
    color: var(--text-muted);
    text-align: center;
    text-transform: uppercase;
    margin-bottom: 52px;
    animation: fadeDown 0.8s 0.1s ease both;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .video-panel {
    width: 100%;
    max-width: 880px;
    animation: fadeUp 0.9s 0.2s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .panel-label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--cyan);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .panel-label::before {
    content: '';
    display: inline-block;
    width: 20px; height: 1px;
    background: var(--cyan);
  }

  .video-frame {
    position: relative;
    background: var(--bg-panel);
    border: 1px solid var(--border-dim);
    padding: 3px;
    box-shadow: 0 0 42px rgba(0, 245, 255, 0.06);
  }

  .video-frame::before,
  .video-frame::after,
  .video-frame .corner-br,
  .video-frame .corner-bl {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    border-color: var(--cyan);
    border-style: solid;
  }

  .video-frame::before  { top: -1px; left: -1px;  border-width: 2px 0 0 2px; }
  .video-frame::after   { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
  .video-frame .corner-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
  .video-frame .corner-bl { bottom: -1px; left: -1px;  border-width: 0 0 2px 2px; }

  .video-container {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    overflow: hidden;
  }

  video#main-video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .video-message {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 28px;
    text-align: center;
    background:
      radial-gradient(circle at center, rgba(0,245,255,0.08), transparent 55%),
      rgba(0,0,0,0.74);
    color: var(--text-muted);
    letter-spacing: 0.08em;
    line-height: 1.7;
  }

  .video-message strong {
    display: block;
    color: var(--cyan);
    font-size: 16px;
    margin-bottom: 6px;
  }

  .url-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 16px;
    padding: 0 4px;
  }

  .url-row input {
    flex: 1;
    background: rgba(0,245,255,0.04);
    border: 1px solid var(--border-dim);
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    letter-spacing: 0.06em;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .url-row input::placeholder { color: rgba(232,244,248,0.25); }
  .url-row input:focus { border-color: var(--cyan); }

  .url-btn {
    padding: 10px 18px;
    background: rgba(0,245,255,0.08);
    border: 1px solid var(--border-dim);
    color: var(--cyan);
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    white-space: nowrap;
  }

  .url-btn:hover { background: rgba(0,245,255,0.14); border-color: var(--cyan); }

  .stats-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-top: 1px solid var(--border-dim);
    background: rgba(0,245,255,0.02);
  }

  .stat-item {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-item span { color: var(--cyan); font-size: 13px; font-weight: 600; }

  .cta-wrap {
    margin-top: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    animation: fadeUp 0.9s 0.4s ease both;
  }

  .cta-label {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .cta-button {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 18px 52px;
    background: transparent;
    border: 1.5px solid var(--cyan);
    color: var(--cyan);
    font-family: 'Orbitron', monospace;
    font-size: clamp(13px, 3vw, 17px);
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    overflow: hidden;
    transition: color 0.3s;
  }

  .cta-button::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--cyan);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.35s cubic-bezier(.77,0,.18,1);
  }

  .cta-button:hover::before { transform: scaleX(1); }
  .cta-button:hover { color: var(--bg-deep); }

  .cta-button .btn-text,
  .cta-button .btn-arrow { position: relative; z-index: 1; }

  .btn-arrow { font-size: 20px; transition: transform 0.25s; }
  .cta-button:hover .btn-arrow { transform: translateX(5px); }

  .cta-button .b-tl, .cta-button .b-tr, .cta-button .b-bl, .cta-button .b-br {
    position: absolute;
    width: 10px; height: 10px;
    border-color: var(--cyan);
    border-style: solid;
    transition: border-color 0.3s;
    z-index: 2;
  }

  .cta-button:hover .b-tl,
  .cta-button:hover .b-tr,
  .cta-button:hover .b-bl,
  .cta-button:hover .b-br { border-color: var(--bg-deep); }

  .b-tl { top: -4px; left: -4px;  border-width: 2px 0 0 2px; }
  .b-tr { top: -4px; right: -4px; border-width: 2px 2px 0 0; }
  .b-bl { bottom: -4px; left: -4px;  border-width: 0 0 2px 2px; }
  .b-br { bottom: -4px; right: -4px; border-width: 0 2px 2px 0; }

  .footer {
    margin-top: 72px;
    width: 100%;
    max-width: 880px;
    border-top: 1px solid var(--border-dim);
    padding-top: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: rgba(232,244,248,0.2);
    text-transform: uppercase;
  }

  @media (max-width: 600px) {
    .site-header { margin-bottom: 32px; }
    .brand { gap: 8px; }
    .logo-mark { width: 34px; height: 34px; }
    .hero-title { margin-bottom: 10px; }
    .hero-sub { margin-bottom: 36px; }
    .stats-bar { flex-wrap: wrap; gap: 10px; }
    .footer { flex-direction: column; gap: 8px; text-align: center; }
    .url-row { flex-direction: column; }
    .url-btn { width: 100%; text-align: center; }
  }
</style>
</head>
<body>

<div class="page-wrapper">

  <header class="site-header">
    <a class="brand" href="#" aria-label="星际误解局首页">
      <div class="logo-mark" aria-hidden="true"></div>
      <div class="logo">星际<span>误解局</span></div>
    </a>
    <div class="header-status">
      <div class="status-dot"></div>
      LIVE&nbsp;&nbsp;SYS.ONLINE
    </div>
  </header>

  <h1 class="hero-title"><span class="accent">星际</span>误解局</h1>
  <p class="hero-sub">地球人 · 月球人 · 文化冲击实录</p>

  <div class="video-panel">
    <div class="panel-label">PREVIEW / 影像档案</div>

    <div class="video-frame">
      <div class="corner-br"></div>
      <div class="corner-bl"></div>

      <div class="video-container">
        <!-- 上线部署时，把视频文件放到 assets/intro.mp4；也可以用 ?video=公网视频URL 覆盖。bg 图片只作为网页背景，不再放入视频区域。 -->
        <video id="main-video" controls autoplay muted playsinline preload="auto">
          <source src="./assets/intro.mp4" type="video/mp4">
          <source src="./assets/intro" type="video/mp4">
          当前浏览器不支持视频播放。
        </video>
        <div class="video-message" id="video-message">
          <div>
            <strong>未检测到线上视频</strong>
            请把视频文件命名为 <code>intro.mp4</code> 并放入 <code>assets</code> 文件夹；背景图命名为 <code>bg.png</code> 并放入同一文件夹。
          </div>
        </div>
      </div>

      <div class="url-row">
        <input type="url" id="video-url-input" placeholder="或粘贴公网视频链接 / paste public video URL…">
        <button class="url-btn" type="button" id="load-url-btn">加载</button>
      </div>

      <div class="stats-bar">
        <div class="stat-item">分辨率 <span id="res-label">—</span></div>
        <div class="stat-item">时长 <span id="dur-label">—</span></div>
        <div class="stat-item">状态 <span id="status-label">待机</span></div>
      </div>
    </div>
  </div>

  <div class="cta-wrap">
    <div class="cta-label">准备进入档案了吗？</div>
    <a class="cta-button" href="https://routhleck.com/moon-hackthon/" target="_blank" rel="noopener">
      <div class="b-tl"></div><div class="b-tr"></div>
      <div class="b-bl"></div><div class="b-br"></div>
      <span class="btn-text">开始游戏</span>
      <span class="btn-arrow">▶</span>
    </a>
  </div>

  <footer class="footer">
    <span>© 2026 星际误解局</span>
    <span>CULTURE LOG · INTERSTELLAR</span>
  </footer>

</div>

<script>
  const DEFAULT_VIDEO = './assets/intro.mp4';

  const video = document.getElementById('main-video');
  const videoMessage = document.getElementById('video-message');
  const videoUrlInput = document.getElementById('video-url-input');
  const loadUrlBtn = document.getElementById('load-url-btn');
  const resLabel = document.getElementById('res-label');
  const durLabel = document.getElementById('dur-label');
  const statusLabel = document.getElementById('status-label');

  function formatDur(s) {
    if (!Number.isFinite(s)) return '—';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2,'0')}`;
  }

  function updateStatus(text) {
    statusLabel.textContent = text;
  }

  function showVideo(src) {
    if (!src) return;
    videoMessage.style.display = 'none';
    video.src = src;
    video.load();
    video.play().catch(() => {
      updateStatus('已加载，需手动播放');
    });
  }

  function loadVideoUrl() {
    const url = videoUrlInput.value.trim();
    if (!url) return;
    showVideo(url);
  }

  function readQueryParam(name) {
    const params = new URLSearchParams(window.location.search);
    return params.get(name);
  }

  const videoFromQuery = readQueryParam('video');
  const bgFromQuery = readQueryParam('bg');

  if (bgFromQuery) {
    document.body.style.backgroundImage = `linear-gradient(rgba(2, 4, 8, 0.54), rgba(2, 4, 8, 0.54)), url('${bgFromQuery}')`;
  }

  if (videoFromQuery) {
    videoUrlInput.value = videoFromQuery;
    showVideo(videoFromQuery);
  }

  video.addEventListener('loadedmetadata', () => {
    resLabel.textContent = `${video.videoWidth}×${video.videoHeight}`;
    durLabel.textContent = formatDur(video.duration);
    updateStatus('已加载');
  });

  video.addEventListener('play',  () => updateStatus('播放中'));
  video.addEventListener('pause', () => updateStatus('暂停'));
  video.addEventListener('ended', () => updateStatus('结束'));
  video.addEventListener('error', () => {
    if ((video.currentSrc || '').includes(DEFAULT_VIDEO)) {
      videoMessage.style.display = 'flex';
      updateStatus('未找到默认视频');
    } else {
      videoMessage.style.display = 'flex';
      videoMessage.querySelector('strong').textContent = '视频链接加载失败';
      updateStatus('加载失败');
    }
  });

  loadUrlBtn.addEventListener('click', loadVideoUrl);
  videoUrlInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') loadVideoUrl();
  });
</script>
</body>
</html>
